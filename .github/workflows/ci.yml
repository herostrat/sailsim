name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run scenario quality gates
        run: |
          sailsim --scenario configs/scenarios/calm_heading_hold.toml --quiet
          sailsim --scenario configs/scenarios/moderate_beam_reach.toml --quiet
          sailsim --scenario configs/scenarios/rough_seas.toml --quiet
          sailsim --scenario configs/scenarios/compare_aggressive.toml --quiet
