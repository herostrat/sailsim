name = "rough_6dof"
duration_s = 120.0
dt = 0.05

[yacht]
profile = "default"
dof = 6

[wind]
speed = 8.0
direction = 1.5708  # 90° beam reach
model = "gust"
gust_intensity = 3.0
gust_seed = 42

[current]
model = "constant"
speed = 0.5
direction = 0.0  # flows north

[waves]
model = "spectral"
Hs = 1.0
Tp = 6.0
direction = 1.5708
seed = 42

[initial_state]
