# Short heading hold scenario for signalk-rs benchmarks
# Requires real-time pacing: 60s sim = ~60s wall time
target_heading = 0.0
duration_s = 60.0
dt = 0.05

[wind]
speed = 5.0
direction = 1.047  # ~60° close reach

[initial_state]
psi = 0.1    # 5.7° initial heading error
u = 2.0

[quality_gates]
max_heading_deviation_deg = 30.0
max_settling_time_s = 55.0
max_mean_heading_error_deg = 15.0
max_rudder_rate_deg_per_s = 80.0
