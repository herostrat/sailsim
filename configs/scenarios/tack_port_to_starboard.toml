name = "tack_port_to_starboard"
duration_s = 120.0
dt = 0.05

[yacht]
profile = "default"

[wind]
speed = 6.0
direction = 0.0  # from north

[autopilot]
kp = 2.0
ki = 0.2
kd = 2.0
target_heading = -0.8727  # close-hauled port tack (-50°)
auto_sail_trim = true

[initial_state]
x = 0.0
y = 0.0
psi = -0.8727  # start on port tack (-50°)
u = 3.0

[[maneuvers.steps]]
time_s = 30.0
target_heading = 0.8727  # tack to starboard (+50°)

[quality_gates]
max_heading_deviation_deg = 60.0
max_rudder_rate_deg_per_s = 50.0
max_settling_time_s = 60.0
max_mean_heading_error_deg = 15.0
