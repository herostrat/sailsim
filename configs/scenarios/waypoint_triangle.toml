[[route.waypoints]]
x = 100.0
y = 0.0
tolerance = 15.0

[[route.waypoints]]
x = 100.0
y = 100.0
tolerance = 15.0

[[route.waypoints]]
x = 0.0
y = 100.0
tolerance = 15.0

[quality_gates]
max_heading_deviation_deg = 90.0
max_rudder_rate_deg_per_s = 50.0
max_settling_time_s = 300.0
max_mean_heading_error_deg = 45.0
