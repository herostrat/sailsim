# Hallberg-Rassy 62
# Hallberg-Rassy 62 bluewater cruiser (18.9m, 33000 kg)
#
# Estimated from: LOA=18.88m, LWL=15.3m, BWL=5.15m,
#   T=2.5m, Displacement=33000kg, Cb=0.38
# Method: Clarke (1983) + ITTC rules of thumb
# See docs/yacht_coefficient_estimation.md

mass = 33000                    # kg
Iz = 482811.0                   # yaw moment of inertia [kg*m^2]
xg = 0.0                        # longitudinal CG position [m]

# Added mass coefficients
X_udot = -3852.0
Y_vdot = -33713.0
Y_rdot = -10086.0
N_vdot = -10086.0
N_rdot = -48281.0

# Linear damping
Xu = -1843.0
Yv = -18499.0
Yr = -13954.0
Nv = -13954.0
Nr = -467782.0

# Quadratic damping
Xuu = -239.6
Yvv = -13214.0
Yrr = -152495.0
Nvv = -9967.0
Nrr = -5112188.0

# Sail properties
sail_area = 176.0               # m^2
mast_height = 24.5              # m
# sail_ce_x: sail centre of effort, longitudinal position from CO [m]
#   Negative = aft of CO.  For weather helm, CE must be AFT of keel CLR.
#   Lead (keel_x − sail_ce_x) should be 3-5% of LWL.
