# Rudder properties
rudder_area = 0.55              # m^2
rudder_x = -7.0                 # longitudinal position [m]
rudder_max = 0.52               # max deflection [rad]
rudder_cp_offset = 0.12         # stock-to-centre-of-pressure [m]

# Keel properties
keel_area = 3.5                 # m^2
# keel_x: keel centre of lateral resistance (CLR), longitudinal position [m]
#   Positive = forward of CO.  Must be forward of sail CE for weather helm.
keel_x = 0.25

# --- 6-DOF extensions ---
Ix = 138391.0                   # roll moment of inertia [kg*m^2]
Iy = 563150.0                   # pitch moment of inertia [kg*m^2]
zg = 0.15                       # vertical CG above origin [m]

# 6-DOF added mass
Z_wdot = -26970.0
K_pdot = -20759.0
M_qdot = -43453.0

# 6-DOF linear damping
Zw = -14799.0
Kp = -57423.0
Mq = -421004.0

# 6-DOF quadratic damping
Zww = -10571.0
Kpp = -211234.0
Mqq = -4600969.0

# Appendage depths (6-DOF moment arms)
sail_ce_z = 10.6                # sail CE height above WL [m]
rudder_z = 0.6                  # rudder center depth below WL [m]
keel_z = 1.68                   # keel CLR depth below WL [m]

# Hydrostatics
